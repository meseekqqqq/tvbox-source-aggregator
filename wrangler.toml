name = "tvbox-source-aggregator"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"

# 自定义域名（可选，推荐配置）
# 取消注释并替换为你自己的域名和 Zone ID
# routes = [
#   { pattern = "tvbox.yourdomain.com/*", zone_id = "your-zone-id" }
# ]

[triggers]
crons = ["0 5 * * *"]  # 每天 UTC 5:00（北京时间 13:00）运行，可按需调整

[[kv_namespaces]]
binding = "KV"
id = "10026447e26f425f826b098145c93429"
preview_id = "78b55efa151c40a5a072d584f1b73ad3"

[vars]
SPEED_TIMEOUT_MS = "5000"   # 源地址延迟阈值（毫秒）
SITE_TIMEOUT_MS = "3000"    # 站点 API 延迟阈值（毫秒）
FETCH_TIMEOUT_MS = "5000"   # 抓取配置 JSON 超时（毫秒）
WORKER_BASE_URL = "https://tvbox.rio.edu.kg"
